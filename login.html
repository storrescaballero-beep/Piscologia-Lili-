<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acceso · Registro de sesiones</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px;">
    <form id="loginForm" class="card" style="width:100%; max-width:380px; padding:32px;">
      <h1 class="serif" style="color:var(--sage-deep); font-size:24px; margin:0 0 4px;">Registro de sesiones</h1>
      <p style="color:var(--ink-soft); font-size:13px; margin:0 0 24px;">Accede con tu usuario del equipo</p>

      <div class="field" style="margin-bottom:14px;">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="username" />
      </div>
      <div class="field" style="margin-bottom:18px;">
        <label for="password">Contraseña</label>
        <input id="password" type="password" required autocomplete="current-password" />
      </div>

      <p id="error" style="color:var(--stamp-red); font-size:13px; margin:0 0 12px; display:none;"></p>

      <button type="submit" class="btn-primary" style="width:100%;" id="submitBtn">Entrar</button>
    </form>
  </div>

  <script>
    const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    // Si ya hay sesión activa, ir directo al registro
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = 'Email o contraseña incorrectos.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>

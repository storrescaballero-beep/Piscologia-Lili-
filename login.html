<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acceso · Registro de sesiones</title>
<link rel="icon" href="icons/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#17356F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sesiones" />
<link rel="stylesheet" href="styles.css" />
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
  }
  if (window.caches) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
  }
</script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>
  <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; background:var(--paper);">
    <img src="assets/logo.png" alt="Isabel Pérez Fraile · Psicóloga sanitaria" style="width:100%; max-width:340px; height:auto; margin-bottom:20px;" />
    <form id="loginForm" class="card" style="width:100%; max-width:380px; padding:32px;">
      <h1 class="serif" style="color:var(--sage-deep); font-size:22px; margin:0 0 4px;">Registro de sesiones</h1>
      <p style="color:var(--ink-soft); font-size:13px; margin:0 0 24px;">Accede con tu usuario del equipo</p>

      <div class="field" style="margin-bottom:14px;">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="username" />
      </div>
      <div class="field" style="margin-bottom:18px;">
        <label for="password">Contraseña</label>
        <input id="password" type="password" required autocomplete="current-password" />
      </div>

      <p id="error" style="color:var(--stamp-red); font-size:13px; margin:0 0 12px; display:none;"></p>

      <button type="submit" class="btn-primary" style="width:100%;" id="submitBtn">Entrar</button>
    </form>
  </div>

  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    // Si ya hay sesión activa, ir directo al registro
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = 'Email o contraseña incorrectos.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>

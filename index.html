<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro de sesiones y pagos</title>
<link rel="icon" href="icons/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#17356F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sesiones" />
<link rel="stylesheet" href="styles.css" />
<script>
  // Limpieza defensiva: elimina cualquier service worker o caché antigua
  // que pudiera estar sirviendo una versión vieja de los scripts.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
  }
  if (window.caches) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
  }
</script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
</head>
<body>

  <header style="background:#FFFFFF; padding:16px 20px;">
    <div style="max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <div style="display:flex; align-items:center; gap:14px;">
        <img src="assets/logo.png" alt="Isabel Pérez Fraile · Psicóloga sanitaria" class="logo-header" />
        <div style="border-left:1px solid var(--line); padding-left:14px;">
          <h1 class="serif" style="color:var(--sage-deep); font-size:19px; margin:0;">Registro de sesiones y pagos</h1>
          <p style="color:var(--ink-soft); font-size:12px; margin:2px 0 0;" id="userLabel">Libro compartido del equipo</p>
        </div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn-header-ghost" id="refreshBtn" style="border-color:var(--line); color:var(--sage-deep);">Actualizar</button>
        <button class="btn-header" id="newBtn" style="background:var(--sage-deep); color:#fff;">+ Nueva sesión</button>
        <button class="btn-header-ghost" id="logoutBtn" style="border-color:var(--line); color:var(--sage-deep);">Cerrar sesión</button>
      </div>
    </div>
  </header>
  <div class="brand-gradient"></div>

  <main style="max-width:1100px; margin:0 auto; padding:24px 20px;">

    <div id="stats" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px;"></div>

    <div id="liquidacion" class="card" style="padding:16px 18px; margin-bottom:24px;"></div>

    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; align-items:center;">
      <input id="searchInput" placeholder="Buscar…" style="flex:1; min-width:180px;" />
      <select id="searchScope" style="min-width:150px;">
        <option value="todos">Buscar en: Todos</option>
        <option value="paciente">Solo Paciente</option>
        <option value="psicologa">Solo Psicóloga</option>
        <option value="responsable_pago">Solo Responsable pago</option>
      </select>
      <select id="estadoFilter"></select>
      <select id="monthFilter"></select>
      <button class="btn-secondary" id="exportBtn">Exportar Excel</button>
    </div>

    <div id="tableContainer"></div>

    <p style="font-size:12px; color:var(--ink-soft); margin-top:16px;">
      Los datos se guardan en la base de datos compartida del equipo (Supabase) y se sincronizan automáticamente entre las 3 personas conectadas.
    </p>
  </main>

  <div id="modalRoot"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
